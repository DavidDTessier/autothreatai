name: Release

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - VERSION

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit:
    uses: ./.github/workflows/audit.yml

  gate:
    needs: audit
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate VERSION
        id: version
        run: |
          set -euo pipefail
          v="$(tr -d ' \t\r\n' < VERSION)"
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::VERSION must contain a single semantic version line (e.g. 1.2.3 or 1.0.0-rc.1)"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $v"

      - name: Refuse if tag already exists
        run: |
          set -euo pipefail
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Git tag v${{ steps.version.outputs.version }} already exists. Bump VERSION for a new release."
            exit 1
          fi

  build-frontend:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend-svelte/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend-svelte
        run: npm ci

      - name: Build frontend (Vite production bundle)
        working-directory: app/frontend-svelte
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend-svelte/dist
          retention-days: 7

  verify-python:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies from lockfile
        run: uv sync --frozen

  publish:
    needs: [gate, build-frontend, verify-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app/frontend-svelte/dist

      - name: Create UI zip archive
        run: |
          set -euo pipefail
          cd app/frontend-svelte
          zip -r "../../autothreat-ai-ui-${{ needs.gate.outputs.version }}.zip" dist

      - name: Create GitHub release and tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          name: Release v${{ needs.gate.outputs.version }}
          files: autothreat-ai-ui-${{ needs.gate.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
