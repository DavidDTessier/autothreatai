name: "Code Audit: Logic, Security & Performance"

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- PYTHON AUDIT ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Audit Tools
        run: |
          pip install ruff intermediate-security-scanner mypy sqlalchemy-stubs

      - name: Run Ruff (Logic & Code Quality)
        run: ruff check . --format=github

      - name: Type Check (Logic Consistency)
        run: mypy . --ignore-missing-imports

      # --- TYPESCRIPT AUDIT ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Audit Tools
        run: npm install && npm install -g @biomejs/biome zod-to-ts

      - name: Biome Lint & Logic Check
        run: npx @biomejs/biome check .

      - name: Security Scan (SCA)
        run: npm audit --audit-level=high

      # --- DATABASE SCHEMA AUDIT ---
      - name: Prisma/SQLAlchemy Schema Sync Check
        run: |
          # Ensure migrations match the current schema state
          # For Prisma: npx prisma validate
          # For SQLAlchemy: alembic check
          echo "Verifying schema integrity..."

      - name: Final Report
        if: always()
        run: echo "Audit complete. Check logs for Logic/Security violations."