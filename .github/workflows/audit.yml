name: "Code Audit: Logic, Security & Performance"

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main]
  workflow_call:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- PYTHON AUDIT ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies (project + dev tools)
        run: uv sync --frozen --group dev

      - name: Run Ruff (Logic & Code Quality)
        run: uv run ruff check . --format=github

      - name: Type Check (Logic Consistency)
        run: uv run mypy . --ignore-missing-imports

      # --- TYPESCRIPT AUDIT ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend-svelte/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend-svelte
        run: npm ci

      - name: Biome Lint & Logic Check
        working-directory: app/frontend-svelte
        run: npm run lint

      - name: Security Scan (SCA)
        working-directory: app/frontend-svelte
        run: npm audit --audit-level=high

      - name: Final Report
        if: always()
        run: echo "Audit complete. Check logs for Logic/Security violations."